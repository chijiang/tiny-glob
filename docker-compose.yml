# TinyGlob:PostgreSQL + 自动迁移 + Next.js 应用
#
# 启动:  docker compose up -d --build
# 应用:  http://localhost:3000
# 日志:  docker compose logs -f app
# 停止:  docker compose down        (保留数据卷)
# 重置:  docker compose down -v     (连数据库一起清掉)
#
# 网络说明:
#   本机 docker bridge 容器间转发被 iptables 拦截(ip_forward 已开,但 FORWARD
#   链规则异常——阿里云 ECS 常见)。故 migrate/app 走 host 网络,经 127.0.0.1
#   连 db 的发布端口(已验证可达)。db 只把 5432 绑到宿主机 loopback,不对公网暴露。
#   根治办法(需 sudo):sudo systemctl restart docker 让 Docker 重建 iptables 规则。

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tinyglob
    volumes:
      - tinyglob-pg:/var/lib/postgresql/data
    ports:
      # 仅绑宿主机 loopback:host 网络的 app/migrate 经 127.0.0.1 连入,且不对公网暴露 DB
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tinyglob"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 一次性服务:应用启动前跑 prisma migrate deploy(幂等,已应用的会跳过)
  migrate:
    build:
      context: .
      target: deps
    command: npx prisma migrate deploy
    network_mode: host
    env_file:
      - .env
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/tinyglob?schema=public
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    network_mode: host
    env_file:
      - .env       # DATABASE_URL / AUTH_SECRET
      - .env.local # LLM_API_KEY / LLM_BASE_URL / LLM_MODEL
    environment:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/tinyglob?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tinyglob-pg:
